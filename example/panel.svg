     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:document-units="mm"
     inkscape:current-layer="svg3" />

  <!-- background -->
  <rect width="180" height="120" fill="white" />

  <!-- panel a: formula (top, full width) -->
  <text
     x="6" y="9"
     font-family="Arial, Helvetica, sans-serif"
     font-size="5" font-weight="bold"
     id="text1">a</text>
  <rect
     id="formula"
     x="6" y="11" width="168" height="18"
     fill="#f9f9f9" stroke="#bbbbbb" stroke-width="0.25"
     stroke-dasharray="1.5,1" />

  <!-- panel b: logistic linear (bottom left) -->
  <text
     x="6" y="36"
     font-family="Arial, Helvetica, sans-serif"
     font-size="5" font-weight="bold"
     id="text2">b</text>
  <rect
     id="logistic"
     x="6" y="38" width="80" height="76"
     fill="#f9f9f9" stroke="#bbbbbb" stroke-width="0.25"
     stroke-dasharray="1.5,1" />

  <!-- panel c: logistic log scale (bottom right) -->
  <text
     x="94" y="36"
     font-family="Arial, Helvetica, sans-serif"
     font-size="5" font-weight="bold"
     id="text3">c</text>
  <rect
